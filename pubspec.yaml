name: audiodockr
description: A local-first Android music player that uses YouTube as its sole content source via yt-dlp.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  sqflite: ^2.3.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0
  permission_handler: ^11.3.1
  file_picker: ^8.1.2
  shared_preferences: ^2.3.2
  http: ^1.2.2
  youtube_explode_dart: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
