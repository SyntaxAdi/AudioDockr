name: audiodockr
description: A local-first Android music player that uses YouTube as its sole content source via yt-dlp.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  sqflite: ^2.3.0
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.17
  cached_network_image: ^3.3.0
  path_provider: ^2.1.1
  google_fonts: ^6.1.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
